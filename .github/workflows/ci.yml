name: CI

on:
  pull_request:
    types: [opened, reopened, synchronize]
  push:
    branches:
      - beta
      - main

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm build
      - run: node lib/index.mjs
      - run: node lib/experimental/index.mjs
      - name: Upload Build Assets
        uses: actions/upload-artifact@v7
        with:
          name: ci-build-assets
          path: lib/

  dedupe_check:
    name: Dedupe Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm dedupe --check --prefer-offline

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: ./e2e
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Download Build Assets
        uses: actions/download-artifact@v8
        with:
          name: ci-build-assets
          path: lib/
      - uses: ./.github/actions/setup
      - run: pnpm test

  engines_check:
    name: Engines Check (Node.js ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22.22.2
          - 22
          - 24.15.0
          - 24
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          cache: pnpm
          node-version: ${{ matrix.node-version }}
      - run: pnpm install --prod --engine-strict --ignore-scripts

  format_check:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm format --list-different

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm site:sync
      - run: pnpm lint

  lint_docs:
    name: Lint Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm docs:generate --check

  lint_knip:
    name: Lint Knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm lint:knip

  test_node:
    name: Test (Node.js ${{ matrix.node-version }}, ESLint ${{ matrix.eslint-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        eslint-version:
          - 9
          - 10
        node-version:
          - 22.22.2
          - 22
          - 24.15.0
          - 24
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
        with:
          node-version: ${{ matrix.node-version }}
      - run: pnpm install -D eslint@${{ matrix.eslint-version }}
      - run: pnpm test run

  test_os:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm run test --coverage
      - uses: codecov/codecov-action@v5
        if: success() && (matrix.os == 'ubuntu-latest')
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  type_check:
    name: Type-check (ESLint ${{ matrix.eslint-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        eslint-version:
          - 9
          - 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm install -D eslint@${{ matrix.eslint-version }}
      - run: pnpm typecheck

  type_check_site:
    name: Type-check Site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - run: pnpm site:typecheck
